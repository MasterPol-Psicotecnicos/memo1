
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MEMO.RAM — Entrenamiento Psicotécnico Tropa y Marinería</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1c1917;
    --bg2: #292524;
    --fg: #fef3c7;
    --accent: #facc15;
    --danger: #dc2626;
    --success: #4ade80;
    --muted: #78716c;
    --border: #fef3c7;
  }
  body { background: var(--bg); color: var(--fg); font-family: 'JetBrains Mono', monospace; min-height: 100vh; overflow-x: hidden; }
  .display { font-family: 'Bungee', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  .container { max-width: 900px; margin: 0 auto; padding: 1rem; position: relative; z-index: 10; }
  .center-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; position: relative; overflow: hidden; }

  .card { border: 4px solid var(--border); background: var(--bg2); padding: 2rem; box-shadow: 8px 8px 0 0 var(--danger); position: relative; }
  .card-lg { padding: 2rem; box-shadow: 12px 12px 0 0 var(--danger); }
  .card.success-glow { border-color: var(--success); box-shadow: 8px 8px 0 0 var(--accent); }
  .card.danger-glow { border-color: var(--danger); box-shadow: 8px 8px 0 0 var(--danger); }
  @media (min-width: 768px) { .card { padding: 3rem; } }

  h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 0.95; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
  h2 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1.5rem; line-height: 1.2; }
  .label { font-size: 0.7rem; letter-spacing: 0.3em; color: #f87171; margin-bottom: 0.5rem; }
  .label-accent { color: var(--accent); font-size: 0.7rem; letter-spacing: 0.2em; margin-bottom: 0.75rem; display: block; }
  .subtitle { font-size: 0.7rem; letter-spacing: 0.4em; color: #f87171; margin-bottom: 0.5rem; }
  .divider { height: 4px; background: var(--fg); width: 6rem; margin: 1rem 0; }
  .text-muted { color: #a8a29e; font-size: 0.9rem; }
  .text-warn { color: var(--accent); }
  .text-danger { color: var(--danger); }
  .text-success { color: var(--success); }

  .btn { display: block; width: 100%; padding: 1rem; border: none; cursor: pointer; font-family: 'Bungee', sans-serif; font-size: 1.1rem; letter-spacing: 0.15em; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: var(--bg); box-shadow: 6px 6px 0 0 var(--danger); }
  .btn-primary:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 0 var(--danger); background: var(--fg); }
  .btn-secondary { background: transparent; border: 2px solid var(--fg); color: var(--fg); }
  .btn-secondary:hover { background: var(--fg); color: var(--bg); }
  .btn-small { padding: 0.6rem; font-size: 0.8rem; }

  .select-grid { display: grid; gap: 0.5rem; margin-bottom: 1rem; }
  .select-3 { grid-template-columns: repeat(3, 1fr); }
  .select-btn { padding: 0.75rem 0.5rem; border: 2px solid var(--muted); background: transparent; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.15s; }
  .select-btn:hover { border-color: var(--fg); color: var(--fg); }
  .select-btn.active { background: var(--danger); border-color: var(--danger); color: var(--fg); box-shadow: 4px 4px 0 0 var(--accent); }

  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
  .mode-card { padding: 1rem; border: 2px solid var(--muted); cursor: pointer; transition: all 0.15s; text-align: left; background: transparent; color: var(--fg); font-family: inherit; }
  .mode-card:hover { border-color: var(--fg); }
  .mode-card.active { border-color: var(--accent); background: rgba(250, 204, 21, 0.05); box-shadow: 4px 4px 0 0 var(--danger); }
  .mode-card .mode-title { font-family: 'Bungee', sans-serif; font-size: 0.95rem; margin-bottom: 0.3rem; }
  .mode-card .mode-desc { font-size: 0.7rem; color: #a8a29e; line-height: 1.4; }

  .types-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
  @media (min-width: 768px) { .types-grid { grid-template-columns: repeat(8, 1fr); } }
  .type-icon { border: 2px solid var(--muted); padding: 0.5rem; text-align: center; transition: all 0.15s; }
  .type-icon:hover { border-color: var(--fg); }
  .type-icon .icon { font-size: 1.5rem; }
  .type-icon .name { font-size: 0.6rem; color: #a8a29e; margin-top: 0.25rem; letter-spacing: 0.05em; }

  .hud { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 2px solid #44403c; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
  .hud-stats { display: flex; gap: 1.5rem; }
  .hud-stat { text-align: left; }
  .hud-stat-label { font-size: 0.6rem; letter-spacing: 0.2em; color: #a8a29e; }
  .hud-stat-value { font-family: 'Bungee', sans-serif; font-size: 1.25rem; }
  .lives { display: flex; gap: 0.25rem; }
  .life { width: 1.25rem; height: 1.25rem; border: 2px solid var(--muted); clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
  .life.active { background: var(--danger); border-color: var(--danger); }

  .progress { height: 0.5rem; background: #44403c; margin-top: 1.5rem; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); transition: width 1s linear; }
  .progress-bar.urgent { background: var(--danger); }

  .challenge-area { display: flex; justify-content: center; padding: 1.5rem 0; min-height: 200px; align-items: center; }
  .grid-display { display: grid; gap: 0.6rem; }
  .cell-empty { background: transparent; border: none; display: flex; align-items: center; justify-content: center; }
  .vase-cell { background: #e7e5e4; border-radius: 8px; padding: 4px; display: flex; align-items: center; justify-content: center; }
  .seq-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 100%; }

  .symbol-cell {
    width: 56px; height: 56px;
    background: var(--fg); border: 3px solid #0c0a09;
    font-family: 'JetBrains Mono', monospace; font-weight: 900;
    font-size: 1.75rem;
    display: flex; align-items: center; justify-content: center;
  }
  .symbol-cell.is-number { color: var(--danger); }
  .symbol-cell.is-letter { color: #0c0a09; }
  .symbol-cell.is-arrow { color: var(--danger); font-size: 2rem; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .option-btn {
    padding: 1.5rem 0.5rem;
    border: 4px solid var(--fg); background: var(--bg);
    color: var(--fg);
    font-family: 'Bungee', sans-serif; font-size: 1.5rem;
    cursor: pointer; transition: all 0.15s;
  }
  .option-btn:hover:not(:disabled) {
    background: var(--accent); color: var(--bg);
    transform: translateY(-2px);
    box-shadow: 4px 4px 0 0 var(--danger);
  }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
  @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-box { border: 2px solid var(--muted); padding: 0.75rem; text-align: center; }
  .stat-box-label { font-size: 0.65rem; color: #a8a29e; letter-spacing: 0.15em; margin-bottom: 0.25rem; }
  .stat-box-value { font-family: 'Bungee', sans-serif; font-size: 1.5rem; color: var(--accent); }

  .deco-square { position: absolute; opacity: 0.2; pointer-events: none; }
  .scanlines::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px); pointer-events: none; z-index: 1; }

  @keyframes pop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
  .pop { animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
  @keyframes pulse-strong { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .pulse-strong { animation: pulse-strong 0.8s ease-in-out infinite; }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-10px); } 40% { transform: translateX(10px); } 60% { transform: translateX(-6px); } 80% { transform: translateX(6px); } }
  .shake { animation: shake 0.5s; }
  @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fade-in 0.3s ease-out; }

  .exam-pip { width: 12px; height: 12px; border: 1px solid var(--muted); }
  .exam-pip.correct { background: var(--success); border-color: var(--success); }
  .exam-pip.wrong { background: var(--danger); border-color: var(--danger); }

  .big-result { font-family: 'Bungee', sans-serif; font-size: clamp(2.5rem, 8vw, 4rem); line-height: 1; margin-bottom: 1rem; }
  .grade { font-family: 'Bungee', sans-serif; font-size: 5rem; color: var(--accent); margin: 1rem 0; }

  .row { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .row > * { flex: 1; }
</style>
</head>
<body>
<div class="scanlines"></div>
<div id="app"></div>

<script>
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const el = (tag, props = {}, ...children) => {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(c) : c);
  }
  return e;
};
const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
const uniqueOptions = (correct, candidates, count = 4) => {
  const set = new Set([correct]);
  for (const c of candidates) { if (set.size >= count) break; if (c !== undefined && c !== null) set.add(c); }
  let extra = 1;
  while (set.size < count) {
    if (typeof correct === 'number') set.add(correct + extra);
    else set.add('?' + extra);
    extra++;
  }
  return shuffle([...set]);
};

const COLORS = {
  rojo: '#e63946', azul: '#1d4ed8', verde: '#16a34a', amarillo: '#facc15',
  morado: '#9333ea', naranja: '#f97316', rosa: '#ec4899', cyan: '#06b6d4',
};
const COLOR_NAMES = Object.keys(COLORS);

const DIFF_CFG = {
  facil:   { gridS: 3, gridM: 3, palette: 3, seqLen: 5 },
  medio:   { gridS: 4, gridM: 4, palette: 4, seqLen: 7 },
  dificil: { gridS: 5, gridM: 5, palette: 5, seqLen: 9 },
};

function genPentagons(diff) {
  const cfg = DIFF_CFG[diff];
  const rows = cfg.gridS, cols = cfg.gridM;
  const palette = COLOR_NAMES.slice(0, cfg.palette);
  const grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => pick(palette)));
  const qType = pick(['total', 'row', 'col', 'corner']);
  let question, answer, opts;
  if (qType === 'total') {
    const t = pick(palette);
    answer = grid.flat().filter(c => c === t).length;
    question = `¿Cuántos pentágonos ${t.toUpperCase()}S había en TOTAL?`;
    opts = uniqueOptions(answer, [Math.max(0, answer - 1), answer + 1, answer + 2]);
  } else if (qType === 'row') {
    const r = randInt(0, rows - 1), t = pick(palette);
    answer = grid[r].filter(c => c === t).length;
    const rN = r === 0 ? 'PRIMERA (arriba)' : r === rows - 1 ? 'ÚLTIMA (abajo)' : `${r + 1}ª`;
    question = `¿Cuántos pentágonos ${t.toUpperCase()}S había en la fila ${rN}?`;
    opts = uniqueOptions(answer, [Math.max(0, answer - 1), Math.min(cols, answer + 1), Math.min(cols, answer + 2)]);
  } else if (qType === 'col') {
    const c = randInt(0, cols - 1), t = pick(palette);
    answer = grid.map(r => r[c]).filter(x => x === t).length;
    const cN = c === 0 ? 'PRIMERA (izquierda)' : c === cols - 1 ? 'ÚLTIMA (derecha)' : `${c + 1}ª`;
    question = `¿Cuántos pentágonos ${t.toUpperCase()}S había en la columna ${cN}?`;
    opts = uniqueOptions(answer, [Math.max(0, answer - 1), Math.min(rows, answer + 1), Math.min(rows, answer + 2)]);
  } else {
    const corners = { 'arriba izquierda': grid[0][0], 'arriba derecha': grid[0][cols - 1], 'abajo izquierda': grid[rows - 1][0], 'abajo derecha': grid[rows - 1][cols - 1] };
    const corner = pick(Object.keys(corners));
    answer = corners[corner];
    question = `¿De qué color era el pentágono de la esquina ${corner.toUpperCase()}?`;
    opts = uniqueOptions(answer, shuffle(palette.filter(c => c !== answer)));
  }
  return { type: 'pentagons', grid, rows, cols, question, answer, options: opts };
}

function genVases(diff) {
  const [rows, cols] = diff === 'facil' ? [2, 3] : diff === 'medio' ? [3, 4] : [4, 4];
  const grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => ({
    color: pick(['blanco', 'negro']),
    direction: pick(['izquierda', 'derecha', 'arriba', 'invertido']),
  })));
  const qType = pick(['color', 'dir', 'combo']);
  let question, answer, opts;
  if (qType === 'color') {
    const t = pick(['blanco', 'negro']);
    answer = grid.flat().filter(v => v.color === t).length;
    question = `¿Cuántos jarrones ${t.toUpperCase()}S había?`;
  } else if (qType === 'dir') {
    const t = pick(['izquierda', 'derecha', 'arriba', 'invertido']);
    answer = grid.flat().filter(v => v.direction === t).length;
    const dt = t === 'arriba' ? 'mirando hacia ARRIBA' : t === 'invertido' ? 'INVERTIDOS (boca abajo)' : `mirando hacia la ${t.toUpperCase()}`;
    question = `¿Cuántos jarrones había ${dt}?`;
  } else {
    const tc = pick(['blanco', 'negro']);
    const td = pick(['izquierda', 'derecha']);
    answer = grid.flat().filter(v => v.color === tc && v.direction === td).length;
    question = `¿Cuántos jarrones ${tc.toUpperCase()}S miraban a la ${td.toUpperCase()}?`;
  }
  opts = uniqueOptions(answer, [Math.max(0, answer - 1), answer + 1, answer + 2]);
  return { type: 'vases', grid, rows, cols, question, answer, options: opts };
}

function genSequence(diff) {
  const length = DIFF_CFG[diff].seqLen;
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const seq = Array.from({ length }, () => chars[randInt(0, chars.length - 1)]);
  const qType = pick(['position', 'letters', 'numbers', 'specific', 'first', 'last']);
  let question, answer, opts;
  if (qType === 'position') {
    const pos = randInt(0, length - 1);
    answer = seq[pos];
    question = `¿Qué carácter estaba en la posición ${pos === 0 ? 'PRIMERA' : pos === length - 1 ? 'ÚLTIMA' : (pos + 1) + 'ª'}?`;
    opts = uniqueOptions(answer, shuffle(chars.split('').filter(c => c !== answer)));
  } else if (qType === 'letters') {
    answer = seq.filter(c => /[A-Z]/.test(c)).length;
    question = `¿Cuántas LETRAS había en la secuencia?`;
    opts = uniqueOptions(answer, [Math.max(0, answer - 1), Math.min(length, answer + 1), Math.min(length, answer + 2)]);
  } else if (qType === 'numbers') {
    answer = seq.filter(c => /[0-9]/.test(c)).length;
    question = `¿Cuántos NÚMEROS había en la secuencia?`;
    opts = uniqueOptions(answer, [Math.max(0, answer - 1), Math.min(length, answer + 1), Math.min(length, answer + 2)]);
  } else if (qType === 'first') {
    answer = seq[0];
    question = `¿Cuál era el PRIMER carácter?`;
    opts = uniqueOptions(answer, shuffle(chars.split('').filter(c => c !== answer)));
  } else if (qType === 'last') {
    answer = seq[length - 1];
    question = `¿Cuál era el ÚLTIMO carácter?`;
    opts = uniqueOptions(answer, shuffle(chars.split('').filter(c => c !== answer)));
  } else {
    const target = pick(seq);
    answer = seq.filter(c => c === target).length;
    question = `¿Cuántas veces aparecía el carácter "${target}"?`;
    opts = uniqueOptions(answer, [Math.max(0, answer - 1), answer + 1, answer + 2]);
  }
  return { type: 'sequence', sequence: seq, question, answer, options: opts };
}

function genArrows(diff) {
  const cfg = DIFF_CFG[diff];
  const rows = cfg.gridS, cols = cfg.gridM;
  const dirs = ['↑', '↓', '←', '→', '↖', '↗', '↘', '↙'];
  const palette = dirs.slice(0, diff === 'facil' ? 4 : 6);
  const grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => pick(palette)));
  const qType = pick(['dir', 'vertical', 'horizontal', 'diagonal']);
  let question, answer, opts;
  if (qType === 'dir') {
    const t = pick(palette);
    answer = grid.flat().filter(d => d === t).length;
    question = `¿Cuántas flechas ${t} había?`;
  } else if (qType === 'vertical') {
    answer = grid.flat().filter(d => d === '↑' || d === '↓').length;
    question = `¿Cuántas flechas VERTICALES (↑↓) había?`;
  } else if (qType === 'horizontal') {
    answer = grid.flat().filter(d => d === '←' || d === '→').length;
    question = `¿Cuántas flechas HORIZONTALES (←→) había?`;
  } else {
    answer = grid.flat().filter(d => ['↖', '↗', '↘', '↙'].includes(d)).length;
    question = `¿Cuántas flechas DIAGONALES había?`;
  }
  opts = uniqueOptions(answer, [Math.max(0, answer - 1), answer + 1, answer + 2]);
  return { type: 'arrows', grid, rows, cols, question, answer, options: opts };
}

function genEmojis(diff) {
  const cfg = DIFF_CFG[diff];
  const rows = cfg.gridS, cols = cfg.gridM;
  const emojis = ['🍎', '🍌', '🍇', '🍓', '🍊', '🥝', '🍑', '🥥'];
  const names = { '🍎': 'manzanas', '🍌': 'plátanos', '🍇': 'uvas', '🍓': 'fresas', '🍊': 'naranjas', '🥝': 'kiwis', '🍑': 'melocotones', '🥥': 'cocos' };
  const palette = emojis.slice(0, cfg.palette);
  const grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => pick(palette)));
  const qType = pick(['total', 'row']);
  let question, answer, opts;
  if (qType === 'total') {
    const t = pick(palette);
    answer = grid.flat().filter(e => e === t).length;
    question = `¿Cuántas ${names[t].toUpperCase()} (${t}) había en TOTAL?`;
  } else {
    const r = randInt(0, rows - 1), t = pick(palette);
    answer = grid[r].filter(e => e === t).length;
    const rN = r === 0 ? 'PRIMERA (arriba)' : r === rows - 1 ? 'ÚLTIMA (abajo)' : `${r + 1}ª`;
    question = `¿Cuántas ${names[t].toUpperCase()} (${t}) había en la fila ${rN}?`;
  }
  opts = uniqueOptions(answer, [Math.max(0, answer - 1), answer + 1, answer + 2]);
  return { type: 'emojis', grid, rows, cols, question, answer, options: opts };
}

function genDots(diff) {
  const [rows, cols] = diff === 'facil' ? [2, 3] : diff === 'medio' ? [3, 3] : [3, 4];
  const grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => randInt(1, 6)));
  const qType = pick(['sum_total', 'sum_row', 'count_value', 'sum_col']);
  let question, answer, opts;
  if (qType === 'sum_total') {
    answer = grid.flat().reduce((a, b) => a + b, 0);
    question = `¿Cuál era la SUMA TOTAL de todos los puntos?`;
    opts = uniqueOptions(answer, [answer - 2, answer + 1, answer + 3]);
  } else if (qType === 'sum_row') {
    const r = randInt(0, rows - 1);
    answer = grid[r].reduce((a, b) => a + b, 0);
    const rN = r === 0 ? 'PRIMERA' : r === rows - 1 ? 'ÚLTIMA' : `${r + 1}ª`;
    question = `¿Cuál era la suma de la fila ${rN}?`;
    opts = uniqueOptions(answer, [answer - 1, answer + 1, answer + 2]);
  } else if (qType === 'sum_col') {
    const c = randInt(0, cols - 1);
    answer = grid.map(r => r[c]).reduce((a, b) => a + b, 0);
    const cN = c === 0 ? 'PRIMERA' : c === cols - 1 ? 'ÚLTIMA' : `${c + 1}ª`;
    question = `¿Cuál era la suma de la columna ${cN}?`;
    opts = uniqueOptions(answer, [answer - 1, answer + 1, answer + 2]);
  } else {
    const t = randInt(1, 6);
    answer = grid.flat().filter(n => n === t).length;
    question = `¿Cuántos dados mostraban ${t} punto${t > 1 ? 's' : ''}?`;
    opts = uniqueOptions(answer, [Math.max(0, answer - 1), answer + 1, answer + 2]);
  }
  return { type: 'dots', grid, rows, cols, question, answer, options: opts };
}

function genPositions(diff) {
  const cfg = DIFF_CFG[diff];
  const rows = cfg.gridS, cols = cfg.gridM;
  const symbols = ['★', '●', '■', '▲', '♦', '♣', '♠', '♥'];
  const palette = symbols.slice(0, diff === 'facil' ? 3 : diff === 'medio' ? 4 : 5);
  const grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => pick(palette)));
  const qType = pick(['what_at', 'count_total']);
  let question, answer, opts;
  if (qType === 'what_at') {
    const r = randInt(0, rows - 1), c = randInt(0, cols - 1);
    answer = grid[r][c];
    const rN = r === 0 ? 'PRIMERA' : r === rows - 1 ? 'ÚLTIMA' : `${r + 1}ª`;
    const cN = c === 0 ? 'PRIMERA' : c === cols - 1 ? 'ÚLTIMA' : `${c + 1}ª`;
    question = `¿Qué símbolo había en la fila ${rN}, columna ${cN}?`;
    opts = uniqueOptions(answer, shuffle(palette.filter(s => s !== answer)));
  } else {
    const t = pick(palette);
    answer = grid.flat().filter(s => s === t).length;
    question = `¿Cuántos símbolos ${t} había en total?`;
    opts = uniqueOptions(answer, [Math.max(0, answer - 1), answer + 1, answer + 2]);
  }
  return { type: 'positions', grid, rows, cols, question, answer, options: opts };
}

function genWords(diff) {
  const length = diff === 'facil' ? 5 : diff === 'medio' ? 7 : 9;
  const pool = ['MESA', 'PERRO', 'CIELO', 'AGUA', 'FUEGO', 'CASA', 'LIBRO', 'COCHE', 'RÍO', 'MAR', 'SOL', 'LUNA', 'PAN', 'LUZ', 'CALLE', 'PUERTA', 'NIÑO', 'FLOR', 'MONTE', 'CAMPO', 'BARCO', 'AVIÓN', 'TREN', 'PLATO', 'VASO', 'SILLA', 'PAPEL', 'TIERRA', 'NUBE', 'PIEDRA'];
  const words = shuffle(pool).slice(0, length);
  const qType = pick(['position', 'present', 'absent']);
  let question, answer, opts;
  if (qType === 'position') {
    const pos = randInt(0, length - 1);
    answer = words[pos];
    question = `¿Qué palabra estaba en la posición ${pos === 0 ? 'PRIMERA' : pos === length - 1 ? 'ÚLTIMA' : (pos + 1) + 'ª'}?`;
    const others = shuffle(pool.filter(w => !words.includes(w))).slice(0, 3);
    opts = shuffle([answer, ...others]);
  } else if (qType === 'present') {
    answer = pick(words);
    question = `¿CUÁL de estas palabras SÍ aparecía?`;
    const others = shuffle(pool.filter(w => !words.includes(w))).slice(0, 3);
    opts = shuffle([answer, ...others]);
  } else {
    answer = pick(pool.filter(w => !words.includes(w)));
    question = `¿CUÁL de estas palabras NO aparecía?`;
    const others = shuffle(words).slice(0, 3);
    opts = shuffle([answer, ...others]);
  }
  return { type: 'words', words, question, answer, options: opts };
}

function renderVase(color, direction, size = 50) {

function renderDie(value, size = 56) {

function buildChallengeDisplay(ch) {
  const container = el('div', { class: 'grid-display', style: { gridTemplateColumns: ch.cols ? `repeat(${ch.cols}, minmax(0, 1fr))` : 'auto' } });
  if (ch.type === 'pentagons') {
    ch.grid.flat().forEach((color, i) => {
      const cell = el('div', { class: 'cell-empty pop', style: { animationDelay: (i * 30) + 'ms' } });
      cell.appendChild(renderPentagon(color));
      container.appendChild(cell);
    });
  } else if (ch.type === 'vases') {
    ch.grid.flat().forEach((v, i) => {
      const cell = el('div', { class: 'vase-cell pop', style: { animationDelay: (i * 30) + 'ms', width: '60px', height: '60px' } });
      cell.appendChild(renderVase(v.color, v.direction));
      container.appendChild(cell);
    });
  } else if (ch.type === 'sequence') {
    container.className = 'seq-row';
    ch.sequence.forEach((c, i) => {
      const isNum = /[0-9]/.test(c);
      container.appendChild(el('div', { class: 'symbol-cell pop ' + (isNum ? 'is-number' : 'is-letter'), style: { animationDelay: (i * 50) + 'ms' } }, c));
    });
  } else if (ch.type === 'arrows') {
    ch.grid.flat().forEach((d, i) => {
      container.appendChild(el('div', { class: 'symbol-cell is-arrow pop', style: { animationDelay: (i * 30) + 'ms' } }, d));
    });
  } else if (ch.type === 'emojis') {
    ch.grid.flat().forEach((e, i) => {
      container.appendChild(el('div', { class: 'symbol-cell pop', style: { animationDelay: (i * 30) + 'ms', fontSize: '1.75rem' } }, e));
    });
  } else if (ch.type === 'dots') {
    ch.grid.flat().forEach((v, i) => {
      const cell = el('div', { class: 'cell-empty pop', style: { animationDelay: (i * 30) + 'ms' } });
      cell.appendChild(renderDie(v));
      container.appendChild(cell);
    });
  } else if (ch.type === 'positions') {
    ch.grid.flat().forEach((s, i) => {
      container.appendChild(el('div', { class: 'symbol-cell pop', style: { animationDelay: (i * 30) + 'ms', fontSize: '1.75rem', color: '#0c0a09' } }, s));
    });
  } else if (ch.type === 'words') {
    container.className = 'seq-row';
    container.style.flexDirection = 'column';
    container.style.gap = '0.4rem';
    ch.words.forEach((w, i) => {
      container.appendChild(el('div', {
        class: 'pop',
        style: { animationDelay: (i * 80) + 'ms', background: 'var(--fg)', color: 'var(--bg)', padding: '0.5rem 1.2rem', fontFamily: 'JetBrains Mono', fontWeight: 800, fontSize: '1.2rem', letterSpacing: '0.1em', border: '3px solid #0c0a09' }
      }, w));
    });
  }
  return container;
}

const STORAGE_KEY = 'memoram_stats_v1';
const loadStats = () => {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { gamesPlayed: 0, totalCorrect: 0, totalAnswered: 0, byType: {}, examsCompleted: 0, bestExamScore: 0 }; }
  catch { return { gamesPlayed: 0, totalCorrect: 0, totalAnswered: 0, byType: {}, examsCompleted: 0, bestExamScore: 0 }; }
};
const saveStats = (s) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} };
const updateStat = (type, correct) => {
  const s = loadStats();
  s.totalAnswered++; if (correct) s.totalCorrect++;
  if (!s.byType[type]) s.byType[type] = { answered: 0, correct: 0 };
  s.byType[type].answered++; if (correct) s.byType[type].correct++;
  saveStats(s);
};

  examLength: 15,
  challenge: null,

  score: 0,
  round: 0,
  streak: 0,
  lives: 3,
  lastCorrect: null,

  timerId: null,
};

const TIME_PRESETS = [

];

function newChallenge() {
  clearTimeout(state.timerId);
  const type = pick(CHALLENGES);
  state.challenge = type.gen(state.difficulty);
  state.timeLeft = state.memorizeTime;
  state.phase = 'memorize';
  render();
  tickMemorize();
}

function tickMemorize() {
  if (state.phase !== 'memorize') return;
  if (state.timeLeft <= 0) {
    state.phase = 'question';
    render();
    return;
  }
  state.timerId = setTimeout(() => {
    state.timeLeft--;
    updateTimerOnly();
    tickMemorize();
  }, 1000);
}

// Actualiza solo el contador y la barra de progreso sin redibujar las imágenes
function updateTimerOnly() {
  if (state.phase !== 'memorize') return;
  const timerEl = document.getElementById('memorize-timer');
  const progressEl = document.getElementById('memorize-progress');
  if (timerEl) {
    timerEl.textContent = state.timeLeft;
    if (state.timeLeft <= 2) timerEl.classList.add('text-danger', 'pulse-strong');
    else timerEl.classList.remove('text-danger', 'pulse-strong');
  }
  if (progressEl) {
    progressEl.style.width = ((state.timeLeft / state.memorizeTime) * 100) + '%';
    if (state.timeLeft <= 2) progressEl.classList.add('urgent');
    else progressEl.classList.remove('urgent');
  }
}

function handleAnswer(opt) {
  if (state.phase !== 'question') return;
  const correct = opt === state.challenge.answer;
  state.lastCorrect = correct;
  state.round++;
  updateStat(state.challenge.type, correct);

  if (state.mode === 'practice') {
    if (correct) {
      const bonus = state.streak * 5;
      const diffBonus = state.difficulty === 'dificil' ? 10 : state.difficulty === 'medio' ? 5 : 0;
      state.score += 10 + bonus + diffBonus;
      state.streak++;
    } else {
      state.streak = 0;
      state.lives--;
    }
    state.phase = 'result';
    render();
    if (!correct && state.lives <= 0) {
      setTimeout(() => { state.phase = 'gameover'; persistGameEnd(); render(); }, 1500);
    }
  } else {
    state.examResults.push({ correct, type: state.challenge.type, question: state.challenge.question, answer: state.challenge.answer, given: opt });
    if (correct) state.score += 10;
    state.phase = 'result';
    render();
    setTimeout(() => {
      if (state.examResults.length >= state.examLength) {
        state.phase = 'exam_result';
        persistExamEnd();
        render();
      } else {
        newChallenge();
      }
    }, 1200);
  }
}

function persistGameEnd() {
  const s = loadStats();
  s.gamesPlayed++;
  saveStats(s);
}

function persistExamEnd() {
  const s = loadStats();
  s.examsCompleted++;
  const correct = state.examResults.filter(r => r.correct).length;
  const pct = Math.round((correct / state.examResults.length) * 100);
  if (pct > s.bestExamScore) s.bestExamScore = pct;
  saveStats(s);
}

function startGame() {
  state.score = 0; state.round = 0; state.streak = 0; state.lives = 3; state.examResults = [];
  newChallenge();
}

    card.appendChild(area);
    const prog = el('div', { class: 'progress' });
    prog.appendChild(el('div', { id: 'memorize-progress', class: 'progress-bar' + (state.timeLeft <= 2 ? ' urgent' : ''), style: { width: ((state.timeLeft / state.memorizeTime) * 100) + '%' } }));
    card.appendChild(prog);
    container.appendChild(card);
  } else if (state.phase === 'question') {
    const card = el('div', { class: 'card fade-in' });
    card.appendChild(el('div', { class: 'subtitle' }, '[ PREGUNTA ]'));
    card.appendChild(el('h2', {}, state.challenge.question));
    const opts = el('div', { class: 'options-grid' });
    state.challenge.options.forEach(o => {
      const display = typeof o === 'string' && o.length > 1 ? o.toUpperCase() : o;
      opts.appendChild(el('button', { class: 'option-btn', onclick: () => handleAnswer(o) }, display));
    });
    card.appendChild(opts);
    container.appendChild(card);
  } else if (state.phase === 'result') {
    const card = el('div', { class: 'card fade-in ' + (state.lastCorrect ? 'success-glow' : 'shake danger-glow') });
    card.appendChild(el('div', { class: 'subtitle', style: { color: state.lastCorrect ? 'var(--success)' : 'var(--danger)' } }, '[ ' + (state.lastCorrect ? 'CORRECTO' : 'INCORRECTO') + ' ]'));
    card.appendChild(el('div', { class: 'big-result' }, state.lastCorrect ? '✓ ¡BIEN!' : '✗ FALLO'));
    if (!state.lastCorrect) {
      card.appendChild(el('div', { class: 'text-muted', style: { marginBottom: '1rem' } },
        'La respuesta correcta era: ',
        el('span', { class: 'text-warn', style: { fontWeight: 800 } }, String(state.challenge.answer).toUpperCase())
      ));
    }
    if (state.lastCorrect && state.streak > 1 && state.mode === 'practice') {
      card.appendChild(el('div', { class: 'text-warn', style: { marginBottom: '1rem' } }, '¡Racha ×' + state.streak + '! Bonus +' + ((state.streak - 1) * 5)));
    }
    if (state.mode === 'practice') {
      const row = el('div', { class: 'row' });
      row.appendChild(el('button', { class: 'btn btn-primary', onclick: newChallenge }, '> SIGUIENTE'));
      row.appendChild(el('button', { class: 'btn btn-secondary btn-small', onclick: backToMenu }, '< MENU'));
      card.appendChild(row);
    } else {
      card.appendChild(el('div', { class: 'text-muted', style: { fontSize: '0.8rem', textAlign: 'center', marginTop: '0.5rem' } }, 'Siguiente pregunta automática...'));
    }
    container.appendChild(card);
  }

  $('#app').appendChild(container);
}

function renderGameOver() {
  const app = $('#app');
  app.innerHTML = '';
  const wrap = el('div', { class: 'center-screen' });
  const card = el('div', { class: 'card card-lg', style: { maxWidth: '420px', textAlign: 'center', borderColor: 'var(--danger)', boxShadow: '12px 12px 0 0 var(--accent)' } });
  card.appendChild(el('div', { class: 'subtitle' }, 'SYSTEM_HALT'));
  const h = el('h1', { class: 'display', style: { fontSize: '3.5rem' } });
  h.innerHTML = 'GAME<br>OVER';
  card.appendChild(h);
  card.appendChild(el('div', { class: 'divider', style: { margin: '1rem auto', background: 'var(--danger)' } }));
  card.appendChild(el('div', { class: 'text-muted', style: { fontSize: '0.8rem' } }, 'PUNTUACIÓN FINAL'));
  card.appendChild(el('div', { class: 'grade' }, state.score));
  card.appendChild(el('div', { class: 'text-muted', style: { fontSize: '0.8rem', marginBottom: '1.5rem' } }, state.round + ' rondas completadas'));
  const row = el('div', { class: 'row' });
  row.appendChild(el('button', { class: 'btn btn-primary', onclick: startGame }, '> REINTENTAR'));
  row.appendChild(el('button', { class: 'btn btn-secondary', onclick: backToMenu }, '< MENU'));
  card.appendChild(row);
  wrap.appendChild(card);
  app.appendChild(wrap);
}

function renderExamResult() {
  const app = $('#app');
  app.innerHTML = '';
  const wrap = el('div', { class: 'center-screen' });
  const correct = state.examResults.filter(r => r.correct).length;
  const total = state.examResults.length;
  const pct = Math.round((correct / total) * 100);
  let label, color;
  if (pct >= 80) { label = 'EXCELENTE'; color = 'var(--success)'; }
  else if (pct >= 60) { label = 'APTO'; color = 'var(--accent)'; }
  else if (pct >= 40) { label = 'INSUFICIENTE'; color = 'var(--accent)'; }
  else { label = 'A ENTRENAR'; color = 'var(--danger)'; }

  const card = el('div', { class: 'card card-lg', style: { maxWidth: '520px', textAlign: 'center' } });
  card.appendChild(el('div', { class: 'subtitle' }, 'EXAMEN_COMPLETADO'));
  card.appendChild(el('h1', { class: 'display', style: { fontSize: '3rem' } }, 'RESULTADO'));
  card.appendChild(el('div', { class: 'divider', style: { margin: '1rem auto' } }));
  card.appendChild(el('div', { class: 'text-muted', style: { fontSize: '0.8rem' } }, 'NOTA'));
  card.appendChild(el('div', { class: 'grade' }, pct + '%'));
  card.appendChild(el('div', { class: 'display', style: { fontSize: '1.25rem', color, marginBottom: '0.5rem' } }, label));
  card.appendChild(el('div', { class: 'text-muted', style: { fontSize: '0.85rem' } }, correct + ' aciertos de ' + total + ' preguntas'));

  const byType = {};
  state.examResults.forEach(r => {
    if (!byType[r.type]) byType[r.type] = { c: 0, t: 0 };
    byType[r.type].t++; if (r.correct) byType[r.type].c++;
  });
  const breakdown = el('div', { style: { marginTop: '1.5rem', textAlign: 'left' } });
  breakdown.appendChild(el('div', { class: 'label-accent' }, '[ POR TIPO ]'));
  Object.entries(byType).forEach(([type, d]) => {
    const ch = CHALLENGES.find(c => c.id === type);
    breakdown.appendChild(el('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.85rem', marginBottom: '0.4rem' } },
      el('span', { style: { fontSize: '1.1rem' } }, ch ? ch.icon : '?'),
      el('span', { style: { width: '6rem', color: '#a8a29e' } }, ch ? ch.name : type),
      el('span', { class: 'display', style: { color: 'var(--accent)' } }, d.c + '/' + d.t)
    ));
  });
  card.appendChild(breakdown);

  const row = el('div', { class: 'row', style: { marginTop: '2rem' } });
  row.appendChild(el('button', { class: 'btn btn-primary', onclick: startGame }, '> OTRO EXAMEN'));
  row.appendChild(el('button', { class: 'btn btn-secondary', onclick: backToMenu }, '< MENU'));
  card.appendChild(row);
  wrap.appendChild(card);
  app.appendChild(wrap);
}

function render() {
  if (state.phase === 'menu') return renderMenu();
  if (state.phase === 'stats') return renderStats();
  if (state.phase === 'gameover') return renderGameOver();
  if (state.phase === 'exam_result') return renderExamResult();
  return renderGame();
}

render();
</script>
</body>
</html>
